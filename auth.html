<!DOCTYPE html>
<html>
<head>
    <title>Auth</title>
</head>
<body>

<h2>Login</h2>
<input type="text" id="login_user" placeholder="Username"><br><br>

<input type="password" id="login_pass" placeholder="Password">
<button onclick="togglePassword('login_pass')">Show</button><br><br>

<button onclick="login()">Login</button>
<p id="login_result"></p>

<hr>

<h2>Register</h2>
<input type="text" id="reg_user" placeholder="Username"><br><br>
<input type="email" id="reg_email" placeholder="Email"><br><br>

<input type="password" id="reg_pass" placeholder="Password">
<button onclick="togglePassword('reg_pass')">Show</button><br><br>

<button onclick="register()">Register</button>
<p id="register_result"></p>

<script>

function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// ================= LOGIN =================
async function login() {

    let username = document.getElementById("login_user").value;
    let password = document.getElementById("login_pass").value;

    let formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("password", password);

    let res = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData
    });

    let data = await res.json();
    console.log(data);

    if (res.status === 200 && data.access_token) {

        localStorage.setItem("token", data.access_token);

        document.getElementById("login_result").innerText = "Login successful ✅";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {
        document.getElementById("login_result").innerText = data.detail || "Login failed ❌";
    }
}

// ================= REGISTER =================
async function register() {

    let formData = new FormData();
    formData.append("username", document.getElementById("reg_user").value);
    formData.append("email", document.getElementById("reg_email").value);
    formData.append("password", document.getElementById("reg_pass").value);

    let res = await fetch("http://127.0.0.1:8000/register_api", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if (res.status === 200) {
        document.getElementById("register_result").innerText = "Registered successfully ✅";
    } else {
        document.getElementById("register_result").innerText = data.detail || "Error ❌";
    }
}

</script>

</body>
</html>
